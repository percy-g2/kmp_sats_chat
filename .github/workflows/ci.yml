name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guards:
    name: Guards (endpoints + env matrix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: No hardcoded endpoints
        run: bash scripts/no-hardcoded-endpoints.sh
      - name: Verify env matrix (each env)
        run: |
          ./gradlew verifyEnvMatrix -Penv=regtest
          ./gradlew verifyEnvMatrix -Penv=signet
          ./gradlew verifyEnvMatrix -Penv=mainnet

  android:
    name: Android (unit tests + assemble matrix)
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      # JVM-host unit tests across all modules (no desktop/jvm target — androidHostTest is the JVM host).
      - name: Unit tests (JVM host)
        run: ./gradlew testAndroidHostTest -Penv=regtest
      # Assemble matrix — ONE env per invocation (buildkonfig.flavor is global; the app flavor is
      # locked to -Penv). mainnetDebug only builds because CI=true.
      - name: Assemble regtest
        run: ./gradlew :androidApp:assembleRegtestDebug :androidApp:assembleRegtestRelease -Penv=regtest
      - name: Assemble signet
        run: ./gradlew :androidApp:assembleSignetDebug :androidApp:assembleSignetRelease -Penv=signet
      - name: Assemble mainnet
        run: ./gradlew :androidApp:assembleMainnetRelease -Penv=mainnet

  ios:
    name: iOS (tests + framework + build-only)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Fetch libsodium iOS slices (:core:crypto cinterop)
        run: bash tooling/fetch-libsodium-ios.sh
      - name: Shared unit tests (iOS simulator)
        run: ./gradlew iosSimulatorArm64Test -Penv=regtest
      - name: Link iOS framework (regtest)
        run: ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64 -Penv=regtest
      # Build-only of each app scheme. ACTIVATE once the shared schemes + per-env xcconfigs are
      # wired into the Xcode project (see iosApp/Configs/README.md). Until then this step is skipped.
      - name: Build iOS app schemes (build-only)
        if: ${{ hashFiles('iosApp/iosApp.xcodeproj/xcshareddata/xcschemes/SatsChat-Regtest.xcscheme') != '' }}
        run: |
          xcodebuild build -project iosApp/iosApp.xcodeproj -scheme SatsChat-Regtest \
            -sdk iphonesimulator CODE_SIGNING_ALLOWED=NO
          xcodebuild build -project iosApp/iosApp.xcodeproj -scheme SatsChat \
            -sdk iphonesimulator CODE_SIGNING_ALLOWED=NO
